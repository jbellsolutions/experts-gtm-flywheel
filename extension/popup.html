<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  :root { --accent:#3457E0; }
  body { width: 380px; font: 13px/1.45 -apple-system, system-ui, sans-serif; margin: 0; padding: 12px; color:#111; }
  h1 { font-size: 13px; margin: 0 0 8px; }
  .row { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
  .chip { border:0; border-radius:999px; padding:4px 9px; font-size:11px; cursor:pointer; background:#eee; color:#333; }
  .chip.on { background: var(--accent); color:#fff; }
  label { font-size:11px; color:#666; display:block; margin:6px 0 2px; }
  textarea, input { width:100%; box-sizing:border-box; font-size:12px; border:1px solid #ddd; border-radius:6px; padding:6px; }
  button.go { width:100%; background:var(--accent); color:#fff; border:0; border-radius:6px; padding:8px; font-weight:600; cursor:pointer; margin-top:8px; }
  button.go:disabled { opacity:.6; }
  .variant { border:1px solid #e5e5e5; border-radius:8px; padding:8px; margin-top:8px; white-space:pre-wrap; }
  .copy { font-size:11px; border:0; background:#eee; border-radius:6px; padding:3px 8px; cursor:pointer; margin-top:6px; }
  .muted { color:#888; font-size:11px; }
  .err { color:#b00; font-size:11px; margin-top:6px; }
  a { color: var(--accent); }
</style>
</head>
<body>
  <h1>AI Guy — Prospecting</h1>
  <div id="needsConfig" class="muted" style="display:none;">
    Set the API URL + key in <a href="#" id="openOpts">Options</a> first.
  </div>
  <div id="app" style="display:none;">
    <label>Channel</label>
    <div class="row" id="channels"></div>
    <label>Voice</label>
    <div class="row" id="voices"></div>
    <label>Prospect (auto-filled from the tab — edit freely)</label>
    <textarea id="prospect" rows="2"></textarea>
    <label id="postLabel">Post / context (highlight text on the page, or paste)</label>
    <textarea id="post" rows="3"></textarea>
    <button class="go" id="go">Generate 3 variants</button>
    <label id="scrapeLabel" style="margin-top:10px;">Drop a post link → leads (or leave blank to use this tab)</label>
    <input id="scrapeUrl" placeholder="https://www.linkedin.com/posts/…  or  /feed/update/…" />
    <button class="go" id="scrape" style="background:#16a34a;margin-top:6px;">🧲 Scrape this post → leads</button>
    <div id="scrapeMsg" class="muted" style="margin-top:6px;"></div>
    <div id="err" class="err"></div>
    <div id="results"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
