<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { font: 14px/1.5 -apple-system, system-ui, sans-serif; max-width: 460px; margin: 24px auto; padding: 0 16px; color:#111; }
  h1 { font-size: 16px; }
  label { display:block; font-size:12px; color:#666; margin:12px 0 4px; }
  input { width:100%; box-sizing:border-box; padding:8px; border:1px solid #ddd; border-radius:6px; font-size:13px; }
  button { margin-top:14px; background:#3457E0; color:#fff; border:0; border-radius:6px; padding:9px 16px; font-weight:600; cursor:pointer; }
  .ok { color:#0a7d28; font-size:12px; margin-left:8px; }
  .muted { color:#888; font-size:12px; margin-top:8px; }
</style>
</head>
<body>
  <h1>AI Guy Prospecting — Settings</h1>
  <label>Dashboard URL</label>
  <input id="dashUrl" placeholder="https://your-dashboard.up.railway.app" />
  <label>Dashboard password</label>
  <input id="password" type="password" placeholder="the same password you use to open the dashboard" />
  <div>
    <button id="save">Save</button><span class="ok" id="ok"></span>
  </div>
  <div class="muted">Same login you use for the dashboard. Stored locally in this browser only.</div>
  <script src="options.js"></script>
</body>
</html>
